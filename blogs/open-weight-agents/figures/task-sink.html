<style>
  .owa-task {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--text-primary);
  }

  .owa-task * { margin: 0; padding: 0; box-sizing: border-box; }

  .owa-task .container { max-width: 820px; width: 100%; }

  .owa-task .fig-header { margin-bottom: 1rem; }

  .owa-task .fig-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    margin-bottom: 0.25rem;
  }

  .owa-task .fig-subtitle {
    font-size: 0.78rem;
    color: var(--text-muted);
    line-height: 1.45;
  }

  .owa-task .chart-card {
    background: var(--bg-glass);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
  }

  .owa-task .legend-row {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    margin-bottom: 1.1rem;
    font-size: 0.72rem;
    color: var(--text-muted);
    flex-wrap: wrap;
  }

  .owa-task .legend-item { display: inline-flex; align-items: center; gap: 6px; }
  .owa-task .legend-swatch { display: inline-block; width: 12px; height: 12px; border-radius: 2px; }
  .owa-task .legend-swatch-good { background: #5fbf94; }
  .owa-task .legend-swatch-sink {
    background: #bf72b0;
    box-shadow: 0 0 0 1.5px rgba(255,255,255,0.55) inset;
  }

  .owa-task .bars { display: flex; flex-direction: column; gap: 0.5rem; }

  .owa-task .bar-row {
    display: grid;
    grid-template-columns: 160px 1fr;
    align-items: center;
  }

  .owa-task .bar-label {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text-primary);
    text-align: right;
    padding-right: 1rem;
  }

  .owa-task .bar-label .kind {
    display: block;
    font-size: 0.62rem;
    color: var(--text-muted);
    font-weight: 400;
    margin-top: 1px;
  }

  .owa-task .bar-track { display: flex; align-items: center; gap: 8px; }

  .owa-task .bar {
    height: 22px;
    min-width: 2px;
    border-radius: 3px;
    transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .owa-task .bar.sink { box-shadow: 0 0 0 1.5px rgba(255,255,255,0.55) inset; }

  .owa-task .bar-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.76rem;
    font-weight: 500;
    color: var(--text-primary);
  }

  .owa-task .fig-caption {
    font-size: 0.72rem;
    color: var(--text-muted);
    line-height: 1.5;
    margin-top: 1rem;
  }
</style>

<div class="owa-task">
  <div class="container">
    <div class="fig-header">
      <div class="fig-title">A whole task category just doesn't work</div>
      <div class="fig-subtitle">Personal-task automation (AppWorld), averaged across all five agents.</div>
    </div>

    <div class="chart-card">
      <div class="legend-row">
        <span class="legend-item"><span class="legend-swatch legend-swatch-good"></span>score &ge; 20%</span>
        <span class="legend-item"><span class="legend-swatch legend-swatch-sink"></span>sink (&lt; 20%)</span>
      </div>
      <div class="bars" id="taskSinkBars"></div>
    </div>

    <div class="fig-caption">
      Outlined bars score below 20%.
    </div>
  </div>
</div>

<script>
(() => {
  const COLOR_GOOD = '#5fbf94';
  const COLOR_SINK = '#bf72b0';
  function cellColor(s) { return s < 0.20 ? COLOR_SINK : COLOR_GOOD; }

  // AppWorld average per model (paper data, mean across 5 agents):
  //   Opus      (0.61+0.64+0.70+0.68+0.66)/5 = 0.658
  //   Gemini    (0.50+0.55+0.13+0.57+0.36)/5 = 0.422
  //   DeepSeek  (0.09+0.04+0.13+0.06+0.03)/5 = 0.070
  //   Kimi      (0.09+0.10+0.11+0.08+0.08)/5 = 0.092
  const rows = [
    { name: 'Claude Opus 4.5', kind: 'closed-source', score: 0.658 },
    { name: 'Gemini 3 Pro',    kind: 'closed-source', score: 0.422 },
    { name: 'DeepSeek V3.2',   kind: 'open-weight',   score: 0.070 },
    { name: 'Kimi K2.5',       kind: 'open-weight',   score: 0.092 },
  ];

  const root = document.getElementById('taskSinkBars');
  root.innerHTML = rows.map(r => {
    const sink = r.score < 0.20 ? ' sink' : '';
    const w = (r.score * 100).toFixed(0);
    return `
      <div class="bar-row">
        <div class="bar-label">${r.name}<span class="kind">${r.kind}</span></div>
        <div class="bar-track">
          <div class="bar${sink}" style="width: 0%; background: ${cellColor(r.score)}" data-width="${w}%"></div>
          <span class="bar-value">${w}%</span>
        </div>
      </div>
    `;
  }).join('');

  requestAnimationFrame(() => {
    setTimeout(() => {
      root.querySelectorAll('.bar').forEach(b => { b.style.width = b.dataset.width; });
    }, 100);
  });
})();
</script>
