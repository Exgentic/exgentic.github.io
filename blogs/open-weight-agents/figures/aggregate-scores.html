<style>
  .owa-agg-chart {
    --clr-opus: #5ba8a0;
    --clr-gemini: #6a8cbe;
    --clr-deepseek: #bf72b0;
    --clr-kimi: #5fbf94;
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--text-primary);
  }

  .owa-agg-chart * { margin: 0; padding: 0; box-sizing: border-box; }

  .owa-agg-chart .container { max-width: 780px; width: 100%; }

  .owa-agg-chart .fig-header { margin-bottom: 1rem; }

  .owa-agg-chart .fig-title {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    margin-bottom: 0.25rem;
  }

  .owa-agg-chart .fig-subtitle {
    font-size: 0.78rem;
    color: var(--text-muted);
    line-height: 1.45;
  }

  .owa-agg-chart .chart-card {
    background: var(--bg-glass);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem 1.25rem 1rem;
  }

  .owa-agg-chart .legend {
    display: flex;
    gap: 1.25rem;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }

  .owa-agg-chart .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .owa-agg-chart .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }

  .owa-agg-chart .legend-dot.closed { background: linear-gradient(90deg, #5ba8a0, #6a8cbe); }
  .owa-agg-chart .legend-dot.open { background: linear-gradient(90deg, #bf72b0, #5fbf94); }

  .owa-agg-chart .model-row {
    display: grid;
    grid-template-columns: 160px 1fr;
    align-items: center;
    margin-bottom: 0.85rem;
    transition: opacity 160ms ease;
  }

  .owa-agg-chart .model-row:last-child { margin-bottom: 0; }

  .owa-agg-chart .model-label {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text-primary);
    text-align: right;
    padding-right: 1.1rem;
  }

  .owa-agg-chart .model-label .kind {
    display: block;
    font-size: 0.66rem;
    font-weight: 400;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .owa-agg-chart .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .owa-agg-chart .bar {
    height: 22px;
    border-radius: 3px;
    min-width: 2px;
    transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 160ms ease;
  }

  .owa-agg-chart .bar-opus { background: var(--clr-opus); }
  .owa-agg-chart .bar-gemini { background: var(--clr-gemini); }
  .owa-agg-chart .bar-deepseek { background: var(--clr-deepseek); }
  .owa-agg-chart .bar-kimi { background: var(--clr-kimi); }

  .owa-agg-chart .bar-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
  }

  .owa-agg-chart .chart-root.is-hovering .model-row { opacity: 0.3; }
  .owa-agg-chart .chart-root.is-hovering .model-row.is-active { opacity: 1; }

  .owa-agg-chart .fig-caption {
    font-size: 0.76rem;
    color: var(--text-muted);
    line-height: 1.5;
    margin-top: 0.85rem;
  }

  @media (max-width: 600px) {
    .owa-agg-chart .chart-card { padding: 1rem 0.85rem 0.85rem; }
    .owa-agg-chart .model-row { grid-template-columns: 1fr; gap: 0.3rem; }
    .owa-agg-chart .model-label { text-align: left; padding-right: 0; }
  }
</style>

<div class="owa-agg-chart">
  <div class="container">
    <div class="fig-header">
      <div class="fig-title">Average success rate across all agent designs and tasks</div>
      <div class="fig-subtitle">Open-weight models trail the frontier closed-source models by 18 to 29 percentage points on average.</div>
    </div>

    <div class="chart-card">
      <div class="legend">
        <div class="legend-item"><div class="legend-dot closed"></div>Closed-source</div>
        <div class="legend-item"><div class="legend-dot open"></div>Open-weight</div>
      </div>

      <div class="chart-root" id="owaAggRoot"></div>
    </div>

    <div class="fig-caption">
      Each score is the average success rate across five agent designs and six benchmark suites (100 tasks each).
    </div>
  </div>
</div>

<script>
(() => {
  const root = document.getElementById('owaAggRoot');
  const data = [
    { label: 'Claude Opus 4.5',  kind: 'closed-source', score: 0.66, cls: 'bar-opus' },
    { label: 'Gemini 3 Pro',     kind: 'closed-source', score: 0.59, cls: 'bar-gemini' },
    { label: 'DeepSeek V3.2',    kind: 'open-weight',   score: 0.41, cls: 'bar-deepseek' },
    { label: 'Kimi K2.5',        kind: 'open-weight',   score: 0.37, cls: 'bar-kimi' },
  ];

  const maxVal = 1.0;

  data.forEach((d) => {
    const row = document.createElement('div');
    row.className = 'model-row';
    const w = (d.score / maxVal) * 100;

    row.innerHTML = `
      <div class="model-label">${d.label}<span class="kind">${d.kind}</span></div>
      <div class="bar-row">
        <div class="bar ${d.cls}" style="width: 0%" data-width="${w}%"></div>
        <span class="bar-score">${Math.round(d.score * 100)}%</span>
      </div>
    `;
    root.appendChild(row);
  });

  requestAnimationFrame(() => {
    setTimeout(() => {
      root.querySelectorAll('.bar').forEach((bar) => {
        bar.style.width = bar.dataset.width;
      });
    }, 100);
  });

  const rows = [...root.querySelectorAll('.model-row')];
  rows.forEach((row) => {
    row.addEventListener('mouseenter', () => {
      root.classList.add('is-hovering');
      rows.forEach((r) => r.classList.remove('is-active'));
      row.classList.add('is-active');
    });
    row.addEventListener('mouseleave', () => {
      root.classList.remove('is-hovering');
      row.classList.remove('is-active');
    });
  });
})();
</script>
