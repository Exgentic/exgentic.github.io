<style>
  .owa-cost-chart {
    --clr-gpt:      #9b8ec4;
    --clr-deepseek: #bf72b0;
    --clr-kimi:     #5fbf94;
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--text-primary);
  }

  .owa-cost-chart * { margin: 0; padding: 0; box-sizing: border-box; }

  .owa-cost-chart .container { max-width: 820px; width: 100%; }

  .owa-cost-chart .fig-header { margin-bottom: 1rem; }

  .owa-cost-chart .fig-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    margin-bottom: 0.25rem;
  }

  .owa-cost-chart .fig-subtitle {
    font-size: 0.78rem;
    color: var(--text-muted);
    line-height: 1.45;
  }

  .owa-cost-chart .chart-card {
    background: var(--bg-glass);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem 1.25rem 1rem;
  }

  .owa-cost-chart .model-row {
    display: grid;
    grid-template-columns: 200px 1fr;
    align-items: center;
    margin-bottom: 0.95rem;
    transition: opacity 160ms ease;
  }

  .owa-cost-chart .model-row:last-child { margin-bottom: 0; }

  .owa-cost-chart .model-label {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text-primary);
    text-align: right;
    padding-right: 1rem;
  }

  .owa-cost-chart .model-label .kind {
    display: block;
    font-size: 0.64rem;
    font-weight: 400;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .owa-cost-chart .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .owa-cost-chart .bar {
    height: 22px;
    border-radius: 3px;
    min-width: 2px;
    transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 160ms ease;
  }

  .owa-cost-chart .bar-gpt      { background: var(--clr-gpt); }
  .owa-cost-chart .bar-deepseek { background: var(--clr-deepseek); }
  .owa-cost-chart .bar-kimi     { background: var(--clr-kimi); }

  .owa-cost-chart .bar-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-primary);
    white-space: nowrap;
  }

  .owa-cost-chart .bar-meta .sep {
    color: var(--text-muted);
    margin: 0 6px;
  }

  .owa-cost-chart .chart-root.is-hovering .model-row { opacity: 0.3; }
  .owa-cost-chart .chart-root.is-hovering .model-row.is-active { opacity: 1; }

  .owa-cost-chart .fig-caption {
    font-size: 0.76rem;
    color: var(--text-muted);
    line-height: 1.5;
    margin-top: 0.9rem;
  }

  @media (max-width: 600px) {
    .owa-cost-chart .chart-card { padding: 1rem 0.85rem 0.85rem; }
    .owa-cost-chart .model-row { grid-template-columns: 1fr; gap: 0.3rem; }
    .owa-cost-chart .model-label { text-align: left; padding-right: 0; }
  }
</style>

<div class="owa-cost-chart">
  <div class="container">
    <div class="fig-header">
      <div class="fig-title">Quality per dollar</div>
      <div class="fig-subtitle">Each model at its best-quality agent. Longer bars are better value.</div>
    </div>

    <div class="chart-card">
      <div class="chart-root" id="owaCostRoot"></div>
    </div>

    <div class="fig-caption">
      Bar length is score divided by per-task cost.
    </div>
  </div>
</div>

<script>
(() => {
  const root = document.getElementById('owaCostRoot');

  // Best-quality configuration for each model (paper data).
  //   GPT-5.2  + ReAct + Shortlisting  : score 46.2%, cost $0.214/task
  //   DeepSeek + ReAct                 : score 45.9%, cost $0.266/task
  //   Kimi K2.5 + ReAct + Shortlisting : score 42.8%, cost $0.292/task
  const data = [
    { label: 'GPT-5.2',         kind: 'closed-source',
      score: 0.462, cost: 0.214, cls: 'bar-gpt' },
    { label: 'DeepSeek V3.2',   kind: 'open-weight',
      score: 0.459, cost: 0.266, cls: 'bar-deepseek' },
    { label: 'Kimi K2.5',       kind: 'open-weight',
      score: 0.428, cost: 0.292, cls: 'bar-kimi' },
  ];

  // Bar length encodes pts/$ (score ÷ cost); inline label shows the underlying score and cost.
  data.forEach(d => { d.ratio = d.score / d.cost; });
  const maxRatio = Math.max(...data.map(d => d.ratio)) * 1.08;

  data.forEach(d => {
    const row = document.createElement('div');
    row.className = 'model-row';
    const w = (d.ratio / maxRatio) * 100;
    const scoreLabel = (d.score * 100).toFixed(1) + '%';
    const costLabel = '$' + d.cost.toFixed(2);

    row.innerHTML = `
      <div class="model-label">${d.label}<span class="kind">${d.kind}</span></div>
      <div class="bar-row">
        <div class="bar ${d.cls}" style="width: 0%" data-width="${w}%"></div>
        <span class="bar-meta">${scoreLabel}<span class="sep">at</span>${costLabel}</span>
      </div>
    `;
    root.appendChild(row);
  });

  requestAnimationFrame(() => {
    setTimeout(() => {
      root.querySelectorAll('.bar').forEach(bar => { bar.style.width = bar.dataset.width; });
    }, 100);
  });

  const rows = [...root.querySelectorAll('.model-row')];
  rows.forEach(row => {
    row.addEventListener('mouseenter', () => {
      root.classList.add('is-hovering');
      rows.forEach(r => r.classList.remove('is-active'));
      row.classList.add('is-active');
    });
    row.addEventListener('mouseleave', () => {
      root.classList.remove('is-hovering');
      row.classList.remove('is-active');
    });
  });
})();
</script>
