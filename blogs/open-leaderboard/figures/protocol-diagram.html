<style>
  .protocol-embed .diagram-wrap {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-glass);
    padding: 20px 16px 14px;
  }

  .protocol-embed .protocol-figure {
    display: block;
    width: 100%;
    height: auto;
  }

  .protocol-embed .protocol-figure .pf-node,
  .protocol-embed .protocol-figure .pf-core-card {
    cursor: default;
  }

  .protocol-embed .protocol-figure .pf-link {
    opacity: 0.7;
    transition: all 160ms ease;
  }

  .protocol-embed .protocol-figure .pf-junction {
    transition: all 160ms ease;
  }

  .protocol-embed .protocol-figure .pf-node rect,
  .protocol-embed .protocol-figure .pf-core rect,
  .protocol-embed .protocol-figure .pf-core-card rect {
    transition: all 160ms ease;
  }

  .protocol-embed .protocol-figure .pf-node.is-active rect,
  .protocol-embed .protocol-figure .pf-core-card.is-active rect {
    stroke: var(--text-muted);
    stroke-width: 1.8;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.10));
  }

  .protocol-embed .protocol-figure .pf-link.is-active {
    stroke: var(--text-muted);
    stroke-width: 2.2;
    opacity: 1;
  }

  .protocol-embed .protocol-figure .pf-junction.is-active {
    fill: var(--text-muted);
    opacity: 1;
  }

  .protocol-embed .protocol-figure .pf-dim {
    opacity: 0.18;
  }

  .protocol-embed figcaption {
    font-size: 0.76rem;
    color: var(--text-muted);
    margin-top: 0.85rem;
    line-height: 1.5;
  }

  .protocol-embed figcaption code {
    font-size: 0.74rem;
    background: var(--bg-glass);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-primary);
    border: 1px solid var(--border);
  }

  /* SVG text fills — explicit colors for dark/light mode */
  .protocol-embed .protocol-figure .pf-section-label {
    fill: var(--text-primary);
    opacity: 0.85;
  }
  .protocol-embed .protocol-figure .pf-section-title {
    fill: var(--text-primary);
  }
  .protocol-embed .protocol-figure .pf-node text {
    fill: var(--text-primary);
  }
  .protocol-embed .protocol-figure .pf-core-card-bg {
    fill: var(--text-primary);
    stroke: var(--border);
  }
  .protocol-embed .protocol-figure .pf-core-card .pf-card-label {
    fill: var(--text-primary);
  }
  .protocol-embed .protocol-figure .pf-core-card .pf-card-desc {
    fill: var(--text-secondary);
  }

  /* Links & junctions use themed stroke/fill */
  .protocol-embed .protocol-figure .pf-link {
    stroke: var(--text-muted);
  }
  .protocol-embed .protocol-figure .pf-junction {
    fill: var(--text-muted);
  }
</style>

<script>
(() => {
  const root = document.querySelector('.protocol-embed');
  const svg = root.querySelector('.protocol-figure');
  const nodes = [...svg.querySelectorAll('.pf-node, .pf-core-card')];
  const links = [...svg.querySelectorAll('.pf-link')];
  const junctions = [...svg.querySelectorAll('.pf-junction')];

  const highlightMap = {
    'agent-claude':  ['agent-claude', 'iface-mcp', 'link-mcp', 'core-internal', 'task', 'context', 'actions'],
    'agent-smol':    ['agent-smol', 'iface-python', 'link-python', 'core-internal', 'task', 'context', 'actions'],
    'agent-react':   ['agent-react', 'iface-tools', 'link-tools', 'core-internal', 'task', 'context', 'actions'],
    'iface-mcp':     ['agent-claude', 'iface-mcp', 'link-mcp', 'core-internal', 'task', 'context', 'actions'],
    'iface-python':  ['agent-smol', 'iface-python', 'link-python', 'core-internal', 'task', 'context', 'actions'],
    'iface-tools':   ['agent-react', 'iface-tools', 'link-tools', 'core-internal', 'task', 'context', 'actions'],
    'env-swe':       ['env-swe', 'link-swe', 'core-internal', 'task', 'context', 'actions'],
    'env-appworld':  ['env-appworld', 'link-appworld', 'core-internal', 'task', 'context', 'actions'],
    'env-tau':       ['env-tau', 'link-tau', 'core-internal', 'task', 'context', 'actions'],
    'task':          ['core-internal', 'task', 'context', 'actions'],
    'context':       ['core-internal', 'task', 'context', 'actions'],
    'actions':       ['core-internal', 'task', 'context', 'actions'],
  };

  function clear() {
    [...nodes, ...links, ...junctions].forEach(el => {
      el.classList.remove('is-active', 'pf-dim');
    });
    links.forEach(l => {
      if (l.getAttribute('marker-end')) {
        l.setAttribute('marker-end', 'url(#arrowHead)');
      }
    });
  }

  function activate(focus) {
    const wanted = new Set(highlightMap[focus] || [focus]);
    const all = [...nodes, ...links, ...junctions];
    all.forEach(el => el.classList.add('pf-dim'));

    nodes.forEach(el => {
      const key = el.getAttribute('data-focus');
      if (wanted.has(key)) {
        el.classList.remove('pf-dim');
        el.classList.add('is-active');
      }
    });

    links.forEach(el => {
      const keys = (el.getAttribute('data-focus') || '').split(/\s+/);
      if (keys.some(k => wanted.has(k))) {
        el.classList.remove('pf-dim');
        el.classList.add('is-active');
        if (el.getAttribute('marker-end')) {
          el.setAttribute('marker-end', 'url(#arrowHeadActive)');
        }
      }
    });

    const hasLeft = ['link-mcp', 'link-python', 'link-tools', 'core-internal'].some(k => wanted.has(k));
    const hasRight = ['link-swe', 'link-appworld', 'link-tau', 'core-internal'].some(k => wanted.has(k));

    junctions.forEach(j => {
      const side = j.getAttribute('data-side');
      if ((side === 'left' && hasLeft) || (side === 'right' && hasRight)) {
        j.classList.remove('pf-dim');
        j.classList.add('is-active');
      }
    });
  }

  nodes.forEach(node => {
    const focus = node.getAttribute('data-focus');
    node.addEventListener('mouseenter', () => activate(focus));
    node.addEventListener('mouseleave', clear);
  });
})();
</script>
