<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Figure Comparison</title>
<link rel="stylesheet" href="/styles.css">
<style>
body { padding: 20px; font-family: Inter, system-ui, sans-serif; }
body::after { display: none !important; }
.compare { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
.compare h3 { grid-column: 1 / -1; margin: 0; color: var(--text-primary); }
.compare .label { font-size: 12px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.05em; }
.compare .panel { border: 1px solid var(--border); border-radius: 8px; padding: 12px; background: var(--bg-glass); }
.compare img { width: 100%; height: auto; border-radius: 4px; }
</style>
</head>
<body>

<h2>Interactive (HTML) vs Static (PNG)</h2>

<div class="compare">
  <h3>Protocol Diagram</h3>
  <div class="panel">
    <div class="label">Interactive HTML</div>
    <iframe src="/blogs/open-leaderboard/figures/protocol-diagram.html" style="width:100%;height:350px;border:none;border-radius:4px;"></iframe>
  </div>
  <div class="panel">
    <div class="label">Static PNG</div>
    <img src="/blogs/open-leaderboard/figures/protocol-diagram.png">
  </div>
</div>

<div class="compare">
  <h3>Pareto Chart</h3>
  <div class="panel">
    <div class="label">Interactive HTML</div>
    <iframe src="/blogs/open-leaderboard/figures/pareto-chart.html" style="width:100%;height:450px;border:none;border-radius:4px;"></iframe>
  </div>
  <div class="panel">
    <div class="label">Static PNG</div>
    <img src="/blogs/open-leaderboard/figures/pareto-chart.png">
  </div>
</div>

<div class="compare">
  <h3>General vs Specialized</h3>
  <div class="panel">
    <div class="label">Interactive HTML</div>
    <iframe src="/blogs/open-leaderboard/figures/general-vs-specialized.html" style="width:100%;height:500px;border:none;border-radius:4px;"></iframe>
  </div>
  <div class="panel">
    <div class="label">Static PNG</div>
    <img src="/blogs/open-leaderboard/figures/general-vs-specialized.png">
  </div>
</div>

<div class="compare">
  <h3>Artifact Switcher</h3>
  <div class="panel">
    <div class="label">Interactive HTML</div>
    <iframe src="/blogs/open-leaderboard/figures/artifact-switcher.html" style="width:100%;height:500px;border:none;border-radius:4px;"></iframe>
  </div>
  <div class="panel">
    <div class="label">Static PNG</div>
    <img src="/blogs/open-leaderboard/figures/artifact-switcher.png">
  </div>
</div>

</body>
</html>
