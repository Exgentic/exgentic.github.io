<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Exgentic - The First Open Leaderboard for General-Purpose AI Agents. Coming Soon.">
    <title>Exgentic - Coming Soon</title>
    <link rel="icon" type="image/png" href="../client/public/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-blue: #4a90e2;
            --background-off-white: #fafafa;
            --text-dark: #2c3e50;
            --text-medium: #5a6c7d;
            --text-gray: #7a8a99;
            --border-light: #e5e7eb;
            --font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        body {
            font-family: var(--font-family);
            background-color: var(--background-off-white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-dark);
        }
        
        .container {
            text-align: center;
            max-width: 800px;
            animation: fadeIn 1s ease-in;
        }
        
        .logo-container {
            margin-bottom: 40px;
        }
        
        .logo {
            max-width: 500px;
            width: 100%;
            height: auto;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 2.25rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            font-size: 1.25rem;
            color: var(--text-medium);
            margin-bottom: 40px;
            line-height: 1.7;
            font-weight: 400;
        }
        
        .coming-soon {
            font-size: 1.5rem;
            color: var(--text-gray);
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .footer {
            margin-top: 80px;
            padding-top: 30px;
            border-top: 1px solid var(--border-light);
            color: var(--text-gray);
            font-size: 0.875rem;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 768px) {
            .logo {
                max-width: 350px;
            }
            
            h1 {
                font-size: 1.75rem;
            }
            
            .subtitle {
                font-size: 1.125rem;
            }
            
            .coming-soon {
                font-size: 1.25rem;
            }
        }
        
        @media (max-width: 480px) {
            .logo {
                max-width: 280px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .subtitle {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="exgentic_banner_black_no_background.png" alt="Exgentic Logo" class="logo">
        </div>
        <h1>The First Open Leaderboard for General-Purpose AI Agents</h1>
        <p class="subtitle">Systematic evaluation across diverse environments without domain-specific tuning</p>
        <p class="coming-soon">Coming Soon</p>
        <div class="footer">
            © 2026 Exgentic. All rights reserved.
        </div>
    </div>
</body>
</html>
